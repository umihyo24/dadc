<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demon Army Dispatch Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <h1>Demon Army Dispatch Center</h1>
        <p>魔王軍向け契約を予算内で遂行するモンスター派遣会社ゲーム</p>
      </div>
      <div class="badge">Monster Staffing Company</div>
    </header>

    <canvas id="gameCanvas" width="1280" height="820" aria-label="Demon Army Dispatch Center game canvas"></canvas>

    <section class="instructions" aria-label="遊び方">
      <strong>目標:</strong> 「10日生存」ではなく、契約成功・利益最適化・低損耗で信用ランクA到達、またはHero Elimination Contract完了を目指します。
      契約を選び、敵軍インテリジェンス・人件費予算・ボーナス条件を読み、利用可能な社員を配置して自動戦闘へ派遣します。合成・レベル・永続強化はなく、利益は人員候補、情報分析、契約枠、スカウト網など意思決定の選択肢にだけ投資できます。
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
