<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demon Army Dispatch Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <h1>Demon Army Dispatch Center</h1>
        <p>魔王軍へ兵力を供給するモンスター人材会社マネジメントゲーム</p>
      </div>
      <div class="badge">Monster Staffing Company</div>
    </header>

    <canvas id="gameCanvas" width="1280" height="820" aria-label="Demon Army Dispatch Center game canvas"></canvas>

    <section class="instructions" aria-label="遊び方">
      <strong>目標:</strong> 「10日生存」ではなく、契約成功・利益最適化・低損耗で信用ランクA到達、またはHero Elimination Contract完了を目指します。
      契約を選び、敵軍インテリジェンスとボーナス条件を読み、応募者を採用・合成・配置して自動戦闘へ派遣します。利益は市場枠、応募者プール、契約枠など意思決定の選択肢にだけ投資できます。
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
