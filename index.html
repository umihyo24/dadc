<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>魔軍派遣センター</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <h1>魔軍派遣センター</h1>
        <p>敵軍インテリジェンスで人材を選ぶ魔軍採用シミュレーション</p>
      </div>
      <div class="badge">魔軍人事部・契約課</div>
    </header>

    <canvas id="gameCanvas" width="1280" height="820" aria-label="魔軍派遣センターのゲームキャンバス"></canvas>

    <section class="instructions" aria-label="遊び方">
      <strong>目標:</strong> 敵軍インテリジェンスを読み、契約ごとに最適な魔物応募者を採用して10日目まで利益を守ること。
      マーケットカードをクリックして雇用し、同種族の2体をクリックして合成し、ユニットを選んで編成枠へ配置してから自動戦闘を開始します。
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
