<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>魔軍派遣センター</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="titlebar">
      <div>
        <h1>魔軍派遣センター</h1>
        <p>採用判断型オートバトラー</p>
      </div>
      <div class="badge">採用責任者モード</div>
    </header>

    <canvas id="gameCanvas" width="1280" height="820" aria-label="魔軍派遣センターのゲームキャンバス"></canvas>

    <section class="instructions" aria-label="遊び方">
      <strong>目標:</strong> 完全公開された敵編成に対して適切な魔物を雇い、10日目まで生き残ること。
      マーケットカードをクリックして雇用し、同種族の2体をクリックして合成し、ユニットを選んで編成枠へ配置してから自動戦闘を開始します。
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
